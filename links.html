<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tony Kurman</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Unbounded:wght@300;400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c1: #ff2d55;
  --c2: #ff6b35;
  --c3: #ffd60a;
  --c4: #30d158;
  --c5: #0a84ff;
  --c6: #bf5af2;
  --dark: #0a0a0f;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
}

html { scroll-behavior: smooth; }

body {
  min-height: 100vh;
  background: var(--dark);
  font-family: 'DM Sans', sans-serif;
  color: white;
  overflow-x: hidden;
  position: relative;
}

/* ── АНИМИРОВАННЫЙ ФОН ── */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

/* Градиентные орбы */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  animation: float linear infinite;
  mix-blend-mode: screen;
  opacity: 0.6;
}
.orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, #ff2d55 0%, transparent 70%); top: -100px; left: -100px; animation-duration: 18s; animation-delay: 0s; }
.orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, #bf5af2 0%, transparent 70%); top: 20%; right: -80px; animation-duration: 22s; animation-delay: -5s; }
.orb-3 { width: 350px; height: 350px; background: radial-gradient(circle, #0a84ff 0%, transparent 70%); bottom: 10%; left: 10%; animation-duration: 16s; animation-delay: -8s; }
.orb-4 { width: 300px; height: 300px; background: radial-gradient(circle, #ffd60a 0%, transparent 70%); bottom: -50px; right: 20%; animation-duration: 20s; animation-delay: -12s; }
.orb-5 { width: 250px; height: 250px; background: radial-gradient(circle, #30d158 0%, transparent 70%); top: 50%; left: 40%; animation-duration: 25s; animation-delay: -3s; }

@keyframes float {
  0%   { transform: translate(0, 0) scale(1); }
  25%  { transform: translate(40px, -60px) scale(1.1); }
  50%  { transform: translate(-30px, 40px) scale(0.95); }
  75%  { transform: translate(50px, 30px) scale(1.05); }
  100% { transform: translate(0, 0) scale(1); }
}

/* Шум-текстура */
.bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
  pointer-events: none;
  opacity: 1;
}

/* Сетка-паттерн */
.bg-grid {
  position: fixed;
  inset: 0;
  z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

/* Бегущие полосы */
.scanlines {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
}

/* ── ОСНОВНОЙ КОНТЕНТ ── */
.page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 20px 80px;
  max-width: 520px;
  margin: 0 auto;
}

/* ── АВАТАР ── */
.avatar-wrap {
  position: relative;
  margin-bottom: 24px;
  animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.5) translateY(20px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.avatar-ring {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, #ff2d55, #ff6b35, #ffd60a, #30d158, #0a84ff, #bf5af2, #ff2d55);
  animation: spin 4s linear infinite;
  z-index: -1;
}

@keyframes spin { to { transform: rotate(360deg); } }

.avatar-ring-blur {
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, #ff2d55, #ff6b35, #ffd60a, #30d158, #0a84ff, #bf5af2, #ff2d55);
  animation: spin 4s linear infinite;
  filter: blur(12px);
  opacity: 0.6;
  z-index: -2;
}

.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid var(--dark);
  object-fit: cover;
  display: block;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  position: relative;
}

/* Иконка-заглушка внутри аватара */
.avatar-placeholder {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 3px solid var(--dark);
  background: linear-gradient(135deg, #1a1a2e 0%, #2d1b69 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 48px;
  color: white;
  letter-spacing: 1px;
}

/* ── ИМЯ ── */
.name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(42px, 10vw, 64px);
  letter-spacing: 3px;
  text-align: center;
  line-height: 1;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #ffffff 0%, #ffffff 40%, #ffd60a 70%, #ff6b35 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

.tagline {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 300;
  color: rgba(255,255,255,0.5);
  letter-spacing: 3px;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 36px;
  animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.35s both;
}

/* ── КАРТОЧКИ ССЫЛОК ── */
.links {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.link-card {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  text-decoration: none;
  color: white;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
              border-color 0.3s ease,
              background 0.3s ease;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.link-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.04));
  pointer-events: none;
}

/* Цветная полоска слева */
.link-card::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 3px 0 0 3px;
  background: var(--accent);
  transition: width 0.3s ease;
}
.link-card:hover::after { width: 5px; }

.link-card:hover {
  transform: translateY(-3px) scale(1.01);
  border-color: var(--accent);
  background: rgba(255,255,255,0.08);
}

/* Свечение при ховере */
.link-card:hover .link-glow {
  opacity: 1;
}
.link-glow {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at left center, var(--accent-glow), transparent 70%);
  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
}

.link-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.1);
  position: relative;
  z-index: 1;
}

.link-text {
  flex: 1;
  position: relative;
  z-index: 1;
}
.link-title {
  font-family: 'Unbounded', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: -0.3px;
  display: block;
  margin-bottom: 2px;
}
.link-sub {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  font-weight: 300;
  display: block;
}

.link-arrow {
  font-size: 18px;
  opacity: 0.4;
  position: relative;
  z-index: 1;
  transition: transform 0.3s ease, opacity 0.3s ease;
}
.link-card:hover .link-arrow {
  transform: translateX(4px);
  opacity: 0.9;
}

/* Анимации появления карточек */
.link-card {
  opacity: 0;
  transform: translateY(20px);
  animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
.link-card:nth-child(1) { animation-delay: 0.5s; }
.link-card:nth-child(2) { animation-delay: 0.62s; }
.link-card:nth-child(3) { animation-delay: 0.74s; }
.link-card:nth-child(4) { animation-delay: 0.86s; }
.link-card:nth-child(5) { animation-delay: 0.98s; }

@keyframes cardIn {
  to { opacity: 1; transform: translateY(0); }
}

/* ── РАЗДЕЛИТЕЛЬ ── */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  margin: 8px 0 4px;
  opacity: 0;
  animation: cardIn 0.6s ease 1.1s forwards;
}
.divider-line { flex: 1; height: 1px; background: var(--border); }
.divider-text {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  white-space: nowrap;
}

/* ── СОЦИАЛКИ ── */
.socials {
  display: flex;
  gap: 12px;
  margin-top: 8px;
  width: 100%;
  justify-content: center;
  opacity: 0;
  animation: cardIn 0.6s ease 1.2s forwards;
}

.social-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 18px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  text-decoration: none;
  color: white;
  font-size: 13px;
  font-weight: 500;
  backdrop-filter: blur(20px);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s;
  flex: 1;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.social-btn::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  border-radius: 3px 0 0 3px;
}
.social-btn:hover {
  transform: translateY(-3px) scale(1.03);
  border-color: var(--accent);
}
.social-icon { font-size: 18px; }

/* ── FOOTER ── */
.footer {
  margin-top: 48px;
  text-align: center;
  opacity: 0;
  animation: cardIn 0.6s ease 1.4s forwards;
}
.footer-dot {
  width: 6px; height: 6px;
  background: conic-gradient(#ff2d55, #bf5af2, #0a84ff, #30d158, #ff2d55);
  border-radius: 50%;
  margin: 0 auto 12px;
  animation: spin 3s linear infinite;
}
.footer-text {
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 1px;
}

/* ── CURSOR ── */
.cursor {
  position: fixed;
  width: 10px; height: 10px;
  background: white;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  mix-blend-mode: difference;
  transition: width 0.3s, height 0.3s;
}
.cursor-ring {
  position: fixed;
  width: 40px; height: 40px;
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  transition: width 0.4s cubic-bezier(0.16,1,0.3,1), height 0.4s cubic-bezier(0.16,1,0.3,1);
}
body { cursor: none; }
a { cursor: none; }

/* ── ACTIVE STATE ── */
.link-card:active { transform: scale(0.98); }

/* ── MOBILE ── */
@media (max-width: 480px) {
  .page { padding: 40px 16px 50px; min-height: unset; }
  .socials { flex-direction: column; }
  .cursor, .cursor-ring { display: none; }
  body { cursor: default; }
  a { cursor: pointer; }
}
</style>
</head>

<script>
// Кастомный курсор
const cursor = document.getElementById('cursor');
const ring = document.getElementById('ring');
let mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top  = my + 'px';
});

(function animRing() {
  rx += (mx - rx) * 0.1;
  ry += (my - ry) * 0.1;
  ring.style.left = rx + 'px';
  ring.style.top  = ry + 'px';
  requestAnimationFrame(animRing);
})();

document.querySelectorAll('a').forEach(el => {
  el.addEventListener('mouseenter', () => {
    cursor.style.width = '20px';
    cursor.style.height = '20px';
    ring.style.width = '70px';
    ring.style.height = '70px';
  });
  el.addEventListener('mouseleave', () => {
    cursor.style.width = '10px';
    cursor.style.height = '10px';
    ring.style.width = '40px';
    ring.style.height = '40px';
  });
});

// Ripple на карточках
document.querySelectorAll('.link-card').forEach(card => {
  card.addEventListener('click', function(e) {
    const r = document.createElement('span');
    r.style.cssText = `
      position:absolute; border-radius:50%;
      background:rgba(255,255,255,0.15);
      width:200px; height:200px;
      left:${e.offsetX - 100}px; top:${e.offsetY - 100}px;
      transform:scale(0); animation:rpl 0.6s ease-out forwards;
      pointer-events:none; z-index:0;
    `;
    this.appendChild(r);
    setTimeout(() => r.remove(), 700);
  });
});

const style = document.createElement('style');
style.textContent = '@keyframes rpl { to { transform:scale(3); opacity:0; } }';
document.head.appendChild(style);

// Параллакс орбов при движении мыши
document.addEventListener('mousemove', e => {
  const cx = e.clientX / window.innerWidth - 0.5;
  const cy = e.clientY / window.innerHeight - 0.5;
  document.querySelectorAll('.orb').forEach((orb, i) => {
    const d = (i + 1) * 15;
    orb.style.transform += ` translate(${cx * d}px, ${cy * d}px)`;
  });
});
</script>
